<!doctype html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, nofollow">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>1986 Class Photo</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f5ef;
      color: #25211a;
      line-height: 1.5;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(1.4rem, 1.1rem + 1vw, 2rem);
    }

    .subtitle {
      margin: 0 0 12px;
      color: #6d685e;
      font-size: 0.95rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(260px, 0.9fr);
      gap: 16px;
      align-items: start;
    }

    .photo-shell {
      border-radius: 14px;
      background: #e8e2d6;
      border: 1px solid #d8d1c4;
      padding: 10px;
    }

    .photo-wrap {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      touch-action: manipulation;
    }

    .photo-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    .hotspots {
      position: absolute;
      inset: 0;
    }

    /* Clean by default: a transparent, head-sized tap target that never
       covers the face. Only the hovered/selected head gets a ring. */
    .dot {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 2px solid transparent;
      background: transparent;
      color: transparent;
      font-size: 12px;
      font-weight: 700;
      display: grid;
      place-items: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.14s ease, box-shadow 0.14s ease, transform 0.14s ease;
    }

    .dot:hover,
    .dot:focus-visible {
      outline: none;
      border-color: #ffd166;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.45), 0 0 16px rgba(255,209,102,0.55);
    }

    .dot.active {
      border-color: #18b3bd;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.5), 0 0 18px rgba(24,179,189,0.7);
      transform: translate(-50%, -50%) scale(1.04);
    }

    .tooltip {
      position: absolute;
      transform: translate(-50%, calc(-100% - 12px));
      min-width: 120px;
      max-width: min(220px, 70vw);
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(37, 33, 26, 0.96);
      color: #fff;
      font-size: 13px;
      line-height: 1.4;
      box-shadow: 0 10px 22px rgba(0,0,0,0.3);
      display: none;
      z-index: 3;
      pointer-events: none;
    }

    .tooltip.visible {
      display: block;
    }

    .tooltip::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -6px;
      width: 10px;
      height: 10px;
      background: rgba(37, 33, 26, 0.96);
      transform: translateX(-50%) rotate(45deg);
    }

    .side {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .search input {
      width: 100%;
      font: inherit;
      min-height: 40px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #d8d1c4;
    }

    .selected {
      border-radius: 12px;
      border: 1px solid #d8d1c4;
      padding: 10px 12px;
      background: #fffdf8;
    }

    .selected-title {
      font-size: 0.85rem;
      color: #6d685e;
      margin-bottom: 3px;
    }

    .selected-name {
      font-size: 1.05rem;
      font-weight: 600;
    }

    .selected-meta {
      font-size: 0.9rem;
      color: #6d685e;
      margin-top: 4px;
    }

    .list {
      max-height: 55vh;
      overflow: auto;
      display: grid;
      gap: 6px;
    }

    .list button {
      width: 100%;
      text-align: left;
      font: inherit;
      min-height: 36px;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid #d8d1c4;
      background: #fff;
      cursor: pointer;
    }

    .list button.active {
      border-color: #0f6d73;
      background: rgba(15, 109, 115, 0.12);
    }

    .num {
      display: inline-grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #f1ede4;
      margin-right: 8px;
      font-size: 11px;
      font-weight: 600;
    }

    .note {
      font-size: 0.9rem;
      color: #6d685e;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .list {
        max-height: none;
      }
    }
  </style>
</head>

          <label class="sr-only" for="searchInput">Search names</label>
          <input id="searchInput" type="search" placeholder="Search a name…">

        <section class="selected" id="selectedCard" aria-live="polite">
          <div class="selected-title">Selected</div>
          <div class="selected-name">No one selected</div>

  <script>
    const data = {
      people: [
        {id:"p01",name:"Nicu Venin",x:21.25,y:22.61},
        {id:"p02",name:"Laura Popovici",x:26.06,y:26.94},

        {id:"p37",name:"Mihaela Lupascu",x:70.31,y:59.10},
        {id:"p38",name:"Irina Vitcu",x:78.56,y:58.92},

        {id:"p40",name:"Manuela Navrea",x:62.75,y:52.43}
      ]
    };

    const photoWrap = document.getElementById("photoWrap");
    const hotspotsEl = document.getElementById("hotspots");
    const peopleList = document.getElementById("peopleList");
    const selectedCard = document.getElementById("selectedCard");
    const searchInput = document.getElementById("searchInput");

    let selectedId = null;

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, ch => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
      }[ch]));
    }

    function renderHotspots(items) {
      hotspotsEl.innerHTML = "";
      items.forEach((person, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "dot" + (person.id === selectedId ? " active" : "");
        btn.style.left = person.x + "%";
        btn.style.top = person.y + "%";
        btn.textContent = String(index + 1);
        btn.setAttribute("aria-label", "Show " + person.name);

        const tooltip = document.createElement("div");
        tooltip.className = "tooltip" + (person.id === selectedId ? " visible" : "");
        tooltip.style.left = person.x + "%";
        tooltip.style.top = person.y + "%";
        tooltip.innerHTML = "<strong>" + escapeHtml(person.name) + "</strong>";

        btn.addEventListener("click", () => selectPerson(person.id));

        hotspotsEl.appendChild(tooltip);
        hotspotsEl.appendChild(btn);
      });
    }

    function renderList(items) {
      peopleList.innerHTML = "";
      items.forEach((person, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = person.id === selectedId ? "active" : "";
        btn.innerHTML = '<span class="num">' + (index + 1) + "</span>" + escapeHtml(person.name);
        btn.addEventListener("click", () => selectPerson(person.id));
        peopleList.appendChild(btn);
      });
    }

    function updateSelectedCard(person) {
      const nameEl = selectedCard.querySelector(".selected-name");
      const metaEl = selectedCard.querySelector(".selected-meta");
      if (!person) {
        nameEl.textContent = "No one selected";
        metaEl.textContent = "Tap a face on the photo or choose a name below.";
        return;
      }
      nameEl.textContent = person.name;
      metaEl.textContent = "Name is also shown in the balloon over the photo.";
    }

    function getFilteredPeople() {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) return data.people;
      return data.people.filter(p => p.name.toLowerCase().includes(q));
    }

    function selectPerson(id) {
      selectedId = id;
      const all = getFilteredPeople();
      const person = data.people.find(p => p.id === id) || null;
      renderHotspots(all);
      renderList(all);
      updateSelectedCard(person);
    }

    searchInput.addEventListener("input", () => {
      const list = getFilteredPeople();
      if (selectedId && !list.some(p => p.id === selectedId)) {
        selectedId = null;
      }
      renderHotspots(list);
      renderList(list);
      updateSelectedCard(data.people.find(p => p.id === selectedId) || null);
    });

    function clearSelection() {
      if (!selectedId && !searchInput.value) return;
      selectedId = null;
      searchInput.value = "";
      renderHotspots(data.people);
      renderList(data.people);
      updateSelectedCard(null);
    }

    // Tap/click anywhere on the photo that isn't a face ring clears the
    // selection and resets the search box so every face is clickable again.
    photoWrap.addEventListener("click", (event) => {
      if (!event.target.closest(".dot")) {
        clearSelection();
      }
    });

    // initial render
    renderHotspots(data.people);
    renderList(data.people);
    updateSelectedCard(null);
  </script>
